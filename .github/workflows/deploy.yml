name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  backend-fly:
    name: Backend → Fly.io
    runs-on: ubuntu-latest
    # Only runs when FLY_API_TOKEN secret is set — safely no-ops otherwise.
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
    steps:
      - uses: actions/checkout@v4
      - name: Gate on secret
        id: gate
        run: |
          if [ -n "${{ secrets.FLY_API_TOKEN }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::FLY_API_TOKEN not set — skipping Fly deploy."
          fi
      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: steps.gate.outputs.enabled == 'true'
      - name: Deploy
        if: steps.gate.outputs.enabled == 'true'
        working-directory: backend
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  frontend-vercel:
    name: Frontend → Vercel
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4
      - name: Gate on secret
        id: gate
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ] && [ -n "${{ secrets.VERCEL_ORG_ID }}" ] && [ -n "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Vercel secrets not set — skipping. Vercel's native GitHub integration may still deploy automatically."
          fi
      - name: Install Vercel CLI
        if: steps.gate.outputs.enabled == 'true'
        run: npm install -g vercel@latest
      - name: Pull env
        if: steps.gate.outputs.enabled == 'true'
        working-directory: frontend
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Build
        if: steps.gate.outputs.enabled == 'true'
        working-directory: frontend
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Deploy
        if: steps.gate.outputs.enabled == 'true'
        working-directory: frontend
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  mobile-android:
    name: Mobile → Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install mobile deps
        working-directory: mobile
        run: npm ci
      - name: Sync Capacitor
        working-directory: mobile
        run: npx cap sync android
        env:
          BIAZMARK_URL: ${{ secrets.BIAZMARK_FRONTEND_URL || 'https://biazmark.vercel.app' }}
      - name: Restore keystore from secret (optional)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > mobile/biazmark-release.keystore
          cat > mobile/android/keystore.properties <<EOF
          storeFile=../../biazmark-release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF
      - name: Build release APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: biazmark-android-release
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
