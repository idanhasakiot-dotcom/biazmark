# Fly.io deployment config for the Biazmark backend.
#
# Steps:
#   1. `fly launch --no-deploy` (generates fly.toml — you can use this one instead)
#   2. `fly postgres create` and attach it: `fly postgres attach <app>`
#   3. `fly redis create` (or use Upstash)
#   4. Set secrets:
#        fly secrets set ANTHROPIC_API_KEY=... SECRET_KEY=... META_APP_ID=... ...
#   5. `fly deploy`
#   6. Put the public URL in your Vercel project as BIAZMARK_BACKEND_URL.

app = "biazmark-backend"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  # SQLite on a persistent volume → $0.15/mo instead of $38 managed Postgres.
  DATABASE_URL = "sqlite+aiosqlite:////data/biazmark.db"
  MEDIA_STORAGE_DIR = "/data/media"
  BIAZMARK_TIER = "basic"

[mounts]
  source = "biazmark_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
